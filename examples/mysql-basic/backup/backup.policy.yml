project:
  name: cargadores

resource:
  name: mysql-main
  type: mysql
  connection:
    host: 127.0.0.1
    port: 3306
    database: cargadores
    username: root

artifact:
  output_dir: ./var/output

runtime:
  lock_dir: ./var/locks

prechecks:
  require_free_space_mb: 256
  warn_free_space_below_mb: 512
  connectivity_timeout_sec: 3
  require_tools:
    - mysql_query_client
    - mysql_dump_client
    - gzip_provider
    - hash_provider

notifications:
  telegram:
    enabled: true
    notify_on:
      - WARN
      - ERROR
